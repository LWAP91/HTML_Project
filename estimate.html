<!DOCTYPE html>
<html>
<head>
    <title>Estimate</title>
    <link rel="stylesheet" href="siteName.css">

    <script>
        function calculateEstimate() {
            var total = 0;

            var vehicle = document.getElementById("vehicle").value;
            var packageType = document.getElementById("package").value;

            if (vehicle == "sedan") total += 20;
            if (vehicle == "suv") total += 35;
            if (vehicle == "truck") total += 40;

            if (packageType == "basic") total += 80;
            if (packageType == "full") total += 140;
            if (packageType == "premium") total += 200;

            if (document.getElementById("wax").checked) total += 30;
            if (document.getElementById("shampoo").checked) total += 40;

            document.getElementById("total").innerHTML = "Estimated Total: $" + total;
        }
    </script>
</head>

<body>
<main>
<h2>Estimate Your Service</h2>

<div class="contact-container">

    <label>Vehicle Type:</label>
    <select id="vehicle">
        <option value="sedan">Sedan</option>
        <option value="suv">SUV</option>
        <option value="truck">Truck</option>
    </select>

    <label>Package:</label>
    <select id="package">
        <option value="basic">Basic</option>
        <option value="full">Full</option>
        <option value="premium">Premium</option>
    </select>

    <p>Extras:</p>
    <input type="checkbox" id="wax"> Wax (+$30)<br>
    <input type="checkbox" id="shampoo"> Shampoo (+$40)

    <br><br>
    <button onclick="calculateEstimate()">Calculate</button>

    <div id="total" class="total">Estimated Total: $0</div>

</div>
</main>
</body>
</html>
