<script>
function askQuestion() {
    let address = prompt("What is your address?");
    
    if (address === null || address === "") {
        document.getElementById("result").innerHTML = "No address entered.";
    } else {
        document.getElementById("result").innerHTML = "We do travel to " + address + "!";
    }
}
</script>

<script>
function openPopup() {
    var popupWindow = window.open("", "popupWindow", "width=400,height=250");

    popupWindow.document.write("<html><head><title>Service Message</title></head><body>");
    popupWindow.document.write("<h2>Brand New Mobile Details</h2>");
    popupWindow.document.write("<p>Please read our booking message before continuing.</p>");
    popupWindow.document.write("<p>Mobile detailing appointments depend on vehicle size, condition, and location.</p>");
    popupWindow.document.write("</body></html>");
}
</script>
<script src="slideshow.js"></script>
<script>
/*
Source: W3Schools
It rotates images every 3 seconds
*/

var images = [
    "images/car1.jpg",
    "images/car2.jpg",
    "images/car3.jpg"
];

var index = 0;

function changeImage() {
    document.getElementById("slide").src = images[index];
    index++;

    if (index >= images.length) {
        index = 0;
    }
}

setInterval(changeImage, 3000);
</script>
